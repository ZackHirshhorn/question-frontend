services:
  - type: web
    name: question-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://question-api-75d6.onrender.com/
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
